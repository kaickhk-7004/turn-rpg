<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14101f">
<title>어둠의 탑 — 턴제 RPG</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 타이틀 화면 -->
<div id="screen-title" class="screen active">
  <div class="title-wrap">
    <div class="title-party">
      <img class="sprite" src="assets/sprites/hero_warrior.png" width="56" height="56" alt="">
      <img class="sprite" src="assets/sprites/hero_rogue.png" width="56" height="56" alt="">
      <img class="sprite" src="assets/sprites/hero_mage.png" width="56" height="56" alt="">
      <img class="sprite" src="assets/sprites/hero_cleric.png" width="56" height="56" alt="">
    </div>
    <h1 class="game-title">어둠의 탑</h1>
    <p class="game-subtitle">TURN-BASED FANTASY RPG</p>
    <button id="btn-continue" class="btn btn-primary btn-large hidden">모험 계속하기</button>
    <button id="btn-newgame" class="btn btn-large">새 모험 시작</button>
  </div>
</div>

<!-- 메인 (탑 진행) 화면 -->
<div id="screen-main" class="screen">
  <header class="topbar">
    <span id="main-floor" class="floor-label">1층</span>
    <span id="main-gold" class="gold-label">🪙 0</span>
  </header>
  <div class="main-body">
    <div id="main-progress" class="floor-progress"></div>
    <div id="main-desc" class="floor-desc"></div>
    <div id="party-strip" class="party-strip"></div>
    <button id="btn-battle" class="btn btn-primary btn-large">⚔️ 전투 시작</button>
  </div>
</div>

<!-- 전투 화면 -->
<div id="screen-battle" class="screen">
  <header class="topbar">
    <span id="battle-floor" class="floor-label"></span>
    <span id="battle-round" class="round-label"></span>
  </header>
  <div id="enemy-area" class="enemy-area"></div>
  <div id="battle-log" class="battle-log"></div>
  <div id="hero-area" class="hero-area"></div>
  <div id="action-bar" class="action-bar hidden">
    <div id="action-hero-name" class="action-hero-name"></div>
    <div class="action-buttons">
      <button class="btn btn-action" data-action="attack">⚔️ 공격</button>
      <button class="btn btn-action" data-action="skill">✨ 스킬</button>
      <button class="btn btn-action" data-action="potion">🧪 물약</button>
      <button class="btn btn-action" data-action="defend">🛡️ 방어</button>
    </div>
    <div id="skill-select" class="skill-select hidden"></div>
    <div id="target-hint" class="target-hint hidden">대상을 선택하세요</div>
  </div>
  <div id="battle-result" class="battle-result hidden"></div>
</div>

<!-- 파티 화면 -->
<div id="screen-party" class="screen">
  <header class="topbar"><span class="floor-label">파티</span><span id="party-gold" class="gold-label"></span></header>
  <div id="party-list" class="party-list"></div>
</div>

<!-- 영웅 상세 화면 -->
<div id="screen-hero" class="screen">
  <header class="topbar">
    <button id="btn-hero-back" class="btn btn-small">← 파티</button>
    <span id="hero-detail-name" class="floor-label"></span>
  </header>
  <div class="hero-detail-tabs">
    <button class="tab-btn active" data-tab="stats">능력치</button>
    <button class="tab-btn" data-tab="equip">장비</button>
    <button class="tab-btn" data-tab="tree">스킬트리</button>
  </div>
  <div id="hero-tab-stats" class="hero-tab active"></div>
  <div id="hero-tab-equip" class="hero-tab"></div>
  <div id="hero-tab-tree" class="hero-tab"></div>
</div>

<!-- 가방 화면 -->
<div id="screen-bag" class="screen">
  <header class="topbar"><span class="floor-label">가방</span><span id="bag-gold" class="gold-label"></span></header>
  <div class="bag-shop">
    <button id="btn-buy-potion" class="btn">🧪 물약 구매 (50G)</button>
    <span id="bag-potions" class="potion-count"></span>
  </div>
  <div id="bag-list" class="bag-list"></div>
</div>

<!-- 하단 네비게이션 -->
<nav id="bottom-nav" class="bottom-nav hidden">
  <button class="nav-btn active" data-screen="main">🗼<span>탑</span></button>
  <button class="nav-btn" data-screen="party">👥<span>파티</span></button>
  <button class="nav-btn" data-screen="bag">🎒<span>가방</span></button>
</nav>

<!-- 아이템/레벨업 팝업 -->
<div id="modal" class="modal hidden">
  <div id="modal-content" class="modal-content"></div>
</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
<script src="js/battle.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
